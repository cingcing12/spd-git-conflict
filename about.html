<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About | SPD Course</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Fredoka', sans-serif; 
            background-color: #fef3c7; /* soft amber background */
        }
        /* Custom hard shadows for the cartoon effect */
        .cartoon-shadow { box-shadow: 6px 6px 0px 0px #1f2937; }
        .cartoon-shadow-sm { box-shadow: 3px 3px 0px 0px #1f2937; }
        
        /* Interactive click effect */
        .btn-press:active {
            transform: translate(6px, 6px);
            box-shadow: 0px 0px 0px 0px #1f2937;
        }
        .btn-press-sm:active {
            transform: translate(3px, 3px);
            box-shadow: 0px 0px 0px 0px #1f2937;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen text-gray-900">

    <header class="w-full p-4 md:p-6">
        <div class="max-w-5xl mx-auto bg-amber-400 border-4 border-gray-900 rounded-2xl cartoon-shadow px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center gap-3">
                <div class="text-4xl bg-white border-2 border-gray-900 rounded-full w-12 h-12 flex items-center justify-center cartoon-shadow-sm">
                    🐻
                </div>
                <h1 class="text-2xl font-bold tracking-wide">SPD Project</h1>
            </div>

            <nav class="flex gap-4">
                <a href="index.html" class="px-5 py-2 bg-white border-2 border-gray-900 rounded-xl cartoon-shadow-sm font-semibold transition-all btn-press-sm hover:bg-amber-50">
                    Home
                </a>
                <a href="#" class="px-5 py-2 bg-orange-500 text-white border-2 border-gray-900 rounded-xl cartoon-shadow-sm font-semibold">
                    About
                </a>
            </nav>
        </div>
    </header>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-2xl w-full bg-white border-4 border-gray-900 rounded-3xl cartoon-shadow p-8 md:p-14 text-center relative overflow-hidden">
            
            <div class="absolute -top-6 -right-6 text-7xl opacity-20 transform rotate-12 select-none">🐾</div>

            <div class="inline-block bg-green-400 border-2 border-gray-900 text-gray-900 font-bold px-4 py-1.5 rounded-full mb-8 cartoon-shadow-sm">
                🌲 Git Practice Zone
            </div>

            <h2 class="text-4xl md:text-5xl font-bold mb-6 text-orange-600 drop-shadow-sm">
                About The Course
            </h2>

            <p class="text-xl md:text-2xl font-medium mb-10 text-gray-700 leading-relaxed z-10 relative">
                This is the main About page. Used for practicing <span class="bg-yellow-300 px-2 py-1 border-2 border-gray-900 rounded-lg inline-block my-1 transform -rotate-1">Modify vs Delete</span> conflicts! 🍯
            </p>

            <a href="index.html" class="inline-block bg-amber-400 hover:bg-amber-500 border-4 border-gray-900 text-gray-900 text-xl font-bold py-3 px-10 rounded-2xl cartoon-shadow transition-all btn-press">
                Back to Den
            </a>
            
        </div>
    </main>

    <footer class="p-6 mt-auto text-center font-bold text-gray-600">
        <p>&copy; 2026 SPD Course | Built with paws</p>
    </footer>

</body>
</html>
